<!DOCTYPE html>
<html lang="es">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg: #f7f8fa;
  --white: #ffffff;
  --surface: #ffffff;
  --border: #e4e8ef;
  --border2: #d0d7e3;
  --navy: #1e293b;
  --navy2: #334155;
  --muted: #94a3b8;
  --muted2: #64748b;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --red: #dc2626;
  --red-light: #fef2f2;
  --purple: #7c3aed;
  --purple-light: #f5f3ff;
  --pink: #be185d;
  --pink-light: #fdf2f8;
  --pecho: #ea580c;
  --espalda: #0284c7;
  --hombro: #9333ea;
  --triceps: #be185d;
  --biceps: #059669;
  --cuad: #ca8a04;
  --fem: #dc2626;
  --r: 10px;
  --r2: 14px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow2: 0 4px 16px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { background: var(--bg); font-family: 'DM Mono', monospace; color: var(--navy); overflow-x: hidden; }

/* ── NAV ── */
.nav {
  position: sticky; top: 0; z-index: 200;
  background: var(--navy);
  padding: 0 16px;
  display: flex; align-items: center; gap: 10px;
  height: 52px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: white; letter-spacing: -0.5px; }
.nav-logo span { color: var(--blue); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 10px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
.nav-btn:hover { background: rgba(255,255,255,0.18); }
.nav-btn.accent { background: var(--blue); }
.week-pill { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 11px; padding: 5px 10px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.week-pill strong { color: #60a5fa; }

/* ── TABS ── */
.tabs-wrap { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 52px; z-index: 190; }
.tabs { display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 12px; gap: 2px; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex-shrink: 0; padding: 12px 14px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
.tab:hover { color: var(--navy2); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }

/* ── MAIN VIEWS ── */
.view { display: none; padding: 16px; max-width: 640px; margin: 0 auto; }
.view.active { display: block; }

/* ── STATS ROW ── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 8px; text-align: center; box-shadow: var(--shadow); }
.stat-val { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--navy); }
.stat-lbl { font-size: 9px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

/* ── MUSCLE SECTION ── */
.muscle-section { margin-bottom: 14px; }
.muscle-hdr { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--white); border: 1px solid var(--border); border-radius: var(--r) var(--r) 0 0; border-bottom: none; }
.muscle-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.muscle-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.muscle-vol-lbl { margin-left: auto; font-size: 10px; color: var(--muted); }
.muscle-vol-val { font-size: 11px; font-weight: 500; color: var(--navy2); margin-left: 4px; }

/* ── EXERCISE CARD ── */
.ex-card { background: var(--white); border: 1px solid var(--border); border-top: none; box-shadow: var(--shadow); }
.ex-card:last-child { border-radius: 0 0 var(--r) var(--r); }
.ex-top { display: flex; align-items: center; gap: 8px; padding: 10px 12px; cursor: pointer; }
.ex-ord { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.ex-name { font-size: 13px; color: var(--navy); flex: 1; line-height: 1.3; }
.ex-alt-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #eff6ff; color: var(--blue); flex-shrink: 0; }
.ex-summary { font-size: 11px; color: var(--muted); margin-left: auto; flex-shrink: 0; }
.ex-chevron { font-size: 14px; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
.ex-card.open .ex-chevron { transform: rotate(180deg); }

/* ── EX BODY ── */
.ex-body { display: none; padding: 0 12px 12px; border-top: 1px solid var(--border); }
.ex-card.open .ex-body { display: block; }

.prev-row { display: flex; align-items: center; gap: 6px; padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px; font-size: 11px; color: var(--muted2); }
.prev-val { color: var(--navy); font-weight: 500; margin-left: auto; }

/* ── INPUT GRID ── */
.input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.input-group { }
.input-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; text-align: center; }
.num-input { width: 100%; background: var(--bg); border: 1.5px solid var(--border2); border-radius: 8px; color: var(--navy); font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; text-align: center; padding: 10px 4px; -moz-appearance: textfield; transition: border-color 0.15s, background 0.15s; }
.num-input::-webkit-outer-spin-button, .num-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.num-input:focus { outline: none; }
.num-input.peso-input:focus { border-color: var(--blue); background: var(--blue-light); }
.num-input.reps-input:focus { border-color: var(--blue); background: var(--blue-light); }
.num-input.rir-input:focus { border-color: var(--amber); background: var(--amber-light); }
.num-input.rir-input { color: var(--amber); }

/* ── METRICS ── */
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
.metric-card { border-radius: 8px; padding: 8px 4px; text-align: center; }
.metric-val { font-size: 14px; font-weight: 600; }
.metric-lbl { font-size: 9px; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.7; }
.m-vol { background: var(--bg); color: var(--navy); }
.m-1rm { background: var(--green-light); color: var(--green); }
.m-int { background: var(--purple-light); color: var(--purple); }
.m-ref { background: var(--pink-light); color: var(--pink); }

/* ── DELTA ── */
.delta-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: var(--bg); border-radius: 8px; margin-bottom: 8px; font-size: 11px; color: var(--muted2); }
.delta-val { font-weight: 600; font-size: 13px; }
.delta-pos { color: var(--green); }
.delta-neg { color: var(--red); }
.delta-zero { color: var(--muted); }

/* ── RIR BUTTONS ── */
.rir-wrap { margin-bottom: 8px; }
.rir-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.rir-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.rir-btn { padding: 6px 11px; border-radius: 20px; font-size: 11px; font-family: 'DM Mono', monospace; border: 1.5px solid var(--border2); background: var(--white); color: var(--muted2); cursor: pointer; transition: all 0.12s; }
.rir-btn.active { border-color: var(--amber); color: var(--amber); background: var(--amber-light); font-weight: 500; }

/* ── NOTES ── */
.notes-input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; color: var(--navy); font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 10px; resize: none; min-height: 44px; }
.notes-input:focus { outline: none; border-color: var(--border2); }

/* ── CHART ── */
.chart-toggle { width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 9px 12px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted2); cursor: pointer; box-shadow: var(--shadow); }
.chart-toggle:active { background: var(--bg); }
.chart-toggle-arrow { font-size: 13px; transition: transform 0.2s; color: var(--blue); }
.chart-toggle.open .chart-toggle-arrow { transform: rotate(180deg); }
.chart-wrap { display: none; background: var(--white); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--r) var(--r); padding: 12px 8px 6px; margin-top: -14px; margin-bottom: 14px; box-shadow: var(--shadow); }
.chart-wrap.open { display: block; }
.chart-wrap text { font-family: 'DM Mono', monospace; }

/* ── HISTORY VIEW ── */
.hist-section { margin-bottom: 20px; }
.hist-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
.hist-table { width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 12px; }
.hist-table-hdr { display: grid; grid-template-columns: 48px repeat(3, 1fr); gap: 0; background: var(--navy); }
.hist-table-hdr span { padding: 9px 6px; font-size: 9px; color: rgba(255,255,255,0.7); text-align: center; text-transform: uppercase; letter-spacing: 0.04em; }
.hist-table-hdr span:first-child { text-align: left; padding-left: 10px; }
.hist-row { display: grid; grid-template-columns: 48px repeat(3, 1fr); border-bottom: 1px solid var(--border); }
.hist-row:last-child { border-bottom: none; }
.hist-cell { padding: 9px 6px; font-size: 12px; text-align: center; color: var(--navy2); }
.hist-cell:first-child { text-align: left; padding-left: 10px; color: var(--navy); font-weight: 500; }
.hist-cell.best { color: var(--green); font-weight: 600; }
.hist-cell.up { color: var(--green); }
.hist-cell.down { color: var(--red); }
.hist-week-badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 4px; background: var(--blue-light); color: var(--blue); margin-right: 4px; }

/* ── WEEK MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; align-items: flex-end; justify-content: center; padding: 0; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px; padding: 20px 20px 32px; box-shadow: var(--shadow2); }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal h3 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 14px; }
.modal-weeks { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 16px; }
.wk-btn { padding: 10px 4px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--white); color: var(--muted2); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; text-align: center; transition: all 0.12s; }
.wk-btn.active { border-color: var(--blue); color: var(--blue); background: var(--blue-light); font-weight: 500; }
.wk-btn.has-data { border-color: var(--border2); color: var(--navy); }
.modal-actions { display: flex; gap: 10px; }
.modal-btn { flex: 1; padding: 13px; border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; border: 1.5px solid var(--border); }
.modal-btn.primary { background: var(--blue); color: white; border-color: var(--blue); font-weight: 500; }
.modal-btn.secondary { background: var(--white); color: var(--muted2); }

/* ── EXPORT/IMPORT PANEL ── */
.io-panel { background: var(--white); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
.io-panel h4 { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.io-panel p { font-size: 11px; color: var(--muted2); margin-bottom: 12px; line-height: 1.5; }
.io-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
.io-btn.export { background: var(--navy); color: white; }
.io-btn.import { background: var(--blue-light); color: var(--blue); border: 1.5px solid var(--blue); }
.io-btn.danger { background: var(--red-light); color: var(--red); border: 1.5px solid var(--red); }
.io-row { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy); color: white; padding: 10px 20px; border-radius: 20px; font-size: 12px; z-index: 999; transition: transform 0.3s; box-shadow: var(--shadow2); white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 32px; margin-bottom: 8px; }
.empty p { font-size: 12px; }

/* ── SERIES TARGET ── */
.obj-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: var(--navy); border-radius: 8px; margin-bottom: 10px; }
.obj-lbl { font-size: 10px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.06em; }
.obj-val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: white; letter-spacing: -0.3px; }
.obj-reps { font-size: 11px; color: rgba(255,255,255,0.65); margin-left: 4px; }
</style>
</head>

<nav class="nav">
  <div class="nav-logo">EN<span>·</span>TRENO</div>
  <div class="nav-right">

</div>

<!-- WEEK MODAL -->
<div class="modal-overlay" id="week-modal" onclick="closeWeekModal(event)">

      <button class="modal-btn secondary" onclick="closeWeekModal()">Cancelar</button>
      <button class="modal-btn primary" onclick="closeWeekModal()">Listo</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// ── STATE ────────────────────────────────────────────────────────────────────
let currentWeek = 1;
let currentDay = 1;
let currentView = 'day';

function getState() {
  try { return JSON.parse(localStorage.getItem('gym_v2') || '{}'); } catch { return {}; }
}
function setState(s) { localStorage.setItem('gym_v2', JSON.stringify(s)); }

function getEx(week, dayId, mIdx, eIdx) {
  const s = getState();
  return s?.[week]?.[dayId]?.[mIdx]?.[eIdx] || {peso:'', reps:'', rir:null, notas:''};
}
function setEx(week, dayId, mIdx, eIdx, data) {
  const s = getState();
  if (!s[week]) s[week] = {};
  if (!s[week][dayId]) s[week][dayId] = {};
  if (!s[week][dayId][mIdx]) s[week][dayId][mIdx] = {};
  s[week][dayId][mIdx][eIdx] = {...getEx(week, dayId, mIdx, eIdx), ...data};
  setState(s);
}

function hasWeekData(week) {
  const s = getState();
  return !!s[week];
}

// ── CALC ─────────────────────────────────────────────────────────────────────
function calcVol(peso, reps, series) {
  const p = parseFloat(peso), r = parseFloat(reps), s = parseFloat(series);
  return (p && r && s) ? p * r * s : null;
}
function calc1RM(peso, reps) {
  const p = parseFloat(peso), r = parseFloat(reps);
  return (p && r) ? Math.round(p * (1 + r / 30) * 10) / 10 : null;
}
function calcInt(peso, rm) {
  return (peso && rm) ? Math.round(parseFloat(peso) / rm * 1000) / 10 : null;
}
function calcRefEf(series, reps, rir) {
  const s = parseFloat(series), r = parseFloat(reps), ri = parseFloat(rir);
  return (s && r && !isNaN(ri)) ? Math.max(0, s * r - s * ri) : null;
}
function getDayVol(week, dayId) {
  let t = 0;
  const s = getState();
  PLAN[dayId-1].muscles.forEach((m, mi) => {
    m.exercises.forEach((ex, ei) => {
      const d = s?.[week]?.[dayId]?.[mi]?.[ei];
      if (d) { const v = calcVol(d.peso, d.reps, ex.series); if (v) t += v; }
    });
  });
  return t;
}
function getMuscleVol(week, dayId, mIdx) {
  let t = 0;
  const s = getState();
  PLAN[dayId-1].muscles[mIdx].exercises.forEach((ex, ei) => {
    const d = s?.[week]?.[dayId]?.[mIdx]?.[ei];
    if (d) { const v = calcVol(d.peso, d.reps, ex.series); if (v) t += v; }
  });
  return t;
}
function getPrevPeso(dayId, mIdx, eIdx) {
  if (currentWeek <= 1) return null;
  const d = getEx(currentWeek - 1, dayId, mIdx, eIdx);
  return d.peso ? parseFloat(d.peso) : null;
}
function fmt(n, dec=0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('es-ES', {maximumFractionDigits: dec, minimumFractionDigits: dec});
}

// ── CHART ────────────────────────────────────────────────────────────────────
function buildChart(rows, chartId) {
  if (rows.length < 2) return '';

  const W = 340, H = 130;
  const PAD = { top: 18, right: 16, bottom: 28, left: 38 };
  const iW = W - PAD.left - PAD.right;
  const iH = H - PAD.top - PAD.bottom;

  const pesos = rows.map(r => parseFloat(r.peso));
  const rms   = rows.map(r => calc1RM(r.peso, r.reps));
  const minP  = Math.min(...pesos);
  const maxP  = Math.max(...pesos);
  const rng   = maxP - minP || 1;

  const xS = i  => PAD.left + (i / (rows.length - 1)) * iW;
  const yS = v  => PAD.top  + iH - ((v - minP) / rng) * iH;

  const pts  = rows.map((r, i) => `${xS(i).toFixed(1)},${yS(parseFloat(r.peso)).toFixed(1)}`);
  const area = [`${xS(0).toFixed(1)},${(PAD.top+iH).toFixed(1)}`, ...pts, `${xS(rows.length-1).toFixed(1)},${(PAD.top+iH).toFixed(1)}`].join(' ');
  const gid  = 'cg' + chartId;

  let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
  <defs>
    <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
  </defs>`;

  // Grid lines y
  [0, 0.5, 1].forEach(t => {
    const gy = PAD.top + iH * (1 - t);
    const val = (minP + rng * t).toFixed(1);
    s += `<line x1="${PAD.left}" y1="${gy.toFixed(1)}" x2="${PAD.left+iW}" y2="${gy.toFixed(1)}" stroke="#e4e8ef" stroke-width="1"/>`;
    s += `<text x="${(PAD.left-5).toFixed(0)}" y="${(gy+3).toFixed(0)}" text-anchor="end" font-size="8" fill="#94a3b8">${val}</text>`;
  });

  // Area + line
  s += `<polygon points="${area}" fill="url(#${gid})"/>`;
  s += `<polyline points="${pts.join(' ')}" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;

  // Puntos, etiquetas semana y peso
  rows.forEach((r, i) => {
    const x   = xS(i);
    const y   = yS(parseFloat(r.peso));
    const best = parseFloat(r.peso) === maxP;
    const col  = best ? '#16a34a' : '#2563eb';
    const rad  = best ? 5.5 : 3.5;

    s += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${rad}" fill="${col}" stroke="white" stroke-width="1.5"/>`;

    // Semana abajo
    s += `<text x="${x.toFixed(1)}" y="${H-5}" text-anchor="middle" font-size="8" fill="#94a3b8">S${String(r.week).padStart(2,'0')}</text>`;

    // Peso arriba del punto (primer, último y máximo)
    if (i === 0 || i === rows.length - 1 || best) {
      const ly = y < PAD.top + 14 ? y + 14 : y - 7;
      s += `<text x="${x.toFixed(1)}" y="${ly.toFixed(0)}" text-anchor="middle" font-size="9" font-weight="600" fill="${col}">${r.peso}</text>`;
    }
  });

  s += `</svg>`;
  return s;
}

// ── RENDER HISTORIAL ──────────────────────────────────────────────────────────
function renderHistorial() {
  const s = getState();
  const weeks = Object.keys(s).map(Number).sort((a,b) => a-b);

  if (!weeks.length) {
    document.getElementById('hist-content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📊</div>
        <p>Aún no hay datos registrados.<br>Completa tu primera semana de entrenamiento.</p>
      </div>`;
    return;
  }

  // Build per-exercise history
  let html = '';
  PLAN.forEach(day => {
    html += `<div class="hist-section">
      <div class="hist-title">${day.label} — ${day.sub}</div>`;

    day.muscles.forEach((muscle, mIdx) => {
      muscle.exercises.forEach((ex, eIdx) => {
        const rows = weeks.map(w => {
          const d = s?.[w]?.[day.id]?.[mIdx]?.[eIdx];
          return { week: w, peso: d?.peso || null, reps: d?.reps || null, rir: d?.rir };
        }).filter(r => r.peso);

        if (!rows.length) return;

        const pesos = rows.map(r => parseFloat(r.peso));
        const best = Math.max(...pesos);

        const rms = rows.map(r => calc1RM(r.peso, r.reps));
        const bestRM = Math.max(...rms.filter(Boolean));

        html += `
          <div class="hist-table">
            <div class="hist-table-hdr">
              <span style="color:${muscle.color}">${ex.name}</span>
              <span>Peso</span>
              <span>Δ peso</span>
              <span>1RM est.</span>
            </div>`;

        rows.forEach((r, i) => {
          const rm = calc1RM(r.peso, r.reps);
          const prevPeso = i > 0 ? parseFloat(rows[i-1].peso) : null;
          const prevRM   = i > 0 ? rms[i-1] : null;
          const deltaPeso = prevPeso !== null ? Math.round((parseFloat(r.peso) - prevPeso)*10)/10 : null;
          const deltaRM   = (prevRM && rm) ? Math.round((rm - prevRM)*10)/10 : null;
          const isBest = parseFloat(r.peso) === best;

          function fmtDelta(d) {
            if (d === null) return {txt:'—', cls:''};
            if (d > 0) return {txt:`+${d}`, cls:'up'};
            if (d < 0) return {txt:`${d}`, cls:'down'};
            return {txt:'=', cls:''};
          }
          const dp = fmtDelta(deltaPeso);
          const dr = fmtDelta(deltaRM);

          html += `
            <div class="hist-row">
              <div class="hist-cell"><span class="hist-week-badge">S${String(r.week).padStart(2,'0')}</span></div>
              <div class="hist-cell${isBest ? ' best' : ''}">${r.peso} kg${isBest ? ' ★' : ''}</div>
              <div class="hist-cell ${dp.cls}">${dp.txt}</div>
              <div class="hist-cell">${rm ? fmt(rm,1) : '—'}</div>
            </div>`;
        });

        html += `</div>`;

        // Gráfica de progresión (desplegable)
        const chartSvg = buildChart(rows, `${day.id}-${mIdx}-${eIdx}`);
        if (chartSvg) {
          const cid = `chart-${day.id}-${mIdx}-${eIdx}`;
          html += `
            <button class="chart-toggle" onclick="toggleChart('${cid}',this)">
              <span>Progresión de peso</span>
              <span class="chart-toggle-arrow">⌄</span>
            </button>
            <div class="chart-wrap" id="${cid}">${chartSvg}</div>`;
        }
      });
    });

    html += `</div>`;
  });

  document.getElementById('hist-content').innerHTML = html;
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
function toggleEx(id) {
  document.getElementById(id).classList.toggle('open');
}

function toggleChart(id, btn) {
  const chart = document.getElementById(id);
  const isOpen = chart.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  if (isOpen) {
    btn.style.borderRadius = 'var(--r) var(--r) 0 0';
    btn.style.borderBottom = 'none';
  } else {
    btn.style.borderRadius = 'var(--r)';
    btn.style.borderBottom = '';
  }
}

function saveField(dayId, mIdx, eIdx, field, value) {
  setEx(currentWeek, dayId, mIdx, eIdx, {[field]: value});
  updateMetrics(dayId, mIdx, eIdx);
}

function saveRirInput(dayId, mIdx, eIdx, value, id) {
  const rir = value !== '' ? parseInt(value) : null;
  setEx(currentWeek, dayId, mIdx, eIdx, {rir});
  // sync buttons
  const btns = document.querySelectorAll(`#e-${dayId}-${mIdx}-${eIdx} .rir-btn`);
  btns.forEach((b, i) => b.classList.toggle('active', i === rir));
  updateMetrics(dayId, mIdx, eIdx);
}

function saveRIR(dayId, mIdx, eIdx, val, id, btn) {
  setEx(currentWeek, dayId, mIdx, eIdx, {rir: val});
  btn.closest('.rir-btns').querySelectorAll('.rir-btn').forEach((b,i) => b.classList.toggle('active', i===val));
  // sync input
  const inp = document.getElementById(`inp-rir-e-${dayId}-${mIdx}-${eIdx}`);
  if (inp) inp.value = val;
  updateMetrics(dayId, mIdx, eIdx);
}

function updateMetrics(dayId, mIdx, eIdx) {
  const id = `e-${dayId}-${mIdx}-${eIdx}`;
  const st = getEx(currentWeek, dayId, mIdx, eIdx);
  const ex = PLAN[dayId-1].muscles[mIdx].exercises[eIdx];

  const vol = calcVol(st.peso, st.reps, ex.series);
  const rm = calc1RM(st.peso, st.reps);
  const intens = calcInt(st.peso, rm);
  const refEf = st.rir !== null ? calcRefEf(ex.series, st.reps, st.rir) : null;

  const el = (sid) => document.getElementById(sid);
  if (el(`m-vol-${id}`)) el(`m-vol-${id}`).textContent = vol ? fmt(vol) : '—';
  if (el(`m-1rm-${id}`)) el(`m-1rm-${id}`).textContent = rm ? fmt(rm,1) : '—';
  if (el(`m-int-${id}`)) el(`m-int-${id}`).textContent = intens ? fmt(intens,1)+'%' : '—';
  if (el(`m-ref-${id}`)) el(`m-ref-${id}`).textContent = refEf !== null ? fmt(refEf) : '—';

  // Update muscle vol
  const mVol = getMuscleVol(currentWeek, dayId, mIdx);
  if (el(`mv-${dayId}-${mIdx}`)) el(`mv-${dayId}-${mIdx}`).textContent = mVol ? fmt(mVol) + ' kg' : '—';

  // Update day total
  const dVol = getDayVol(currentWeek, dayId);
  if (el('sv-vol')) el('sv-vol').textContent = dVol ? fmt(dVol) : '—';
}

function switchDay(dayId) {
  currentDay = dayId;
  renderTabs();
  renderDay();
}

function showView(v) {
  currentView = v;
  document.getElementById('view-day').classList.toggle('active', v === 'day');
  document.getElementById('view-historial').classList.toggle('active', v === 'historial');
  if (v === 'historial') renderHistorial();
}

// ── WEEK MODAL ────────────────────────────────────────────────────────────────
function openWeekModal() {
  const container = document.getElementById('modal-weeks');
  container.innerHTML = Array.from({length:20},(_,i)=>i+1).map(w => {
    const hasData = hasWeekData(w);
    return `<button class="wk-btn${w===currentWeek?' active':''}${hasData?' has-data':''}"
      onclick="selectWeek(${w},this)">S${String(w).padStart(2,'0')}</button>`;
  }).join('');
  document.getElementById('week-modal').classList.add('open');
}

function closeWeekModal(e) {
  if (!e || e.target === document.getElementById('week-modal')) {
    document.getElementById('week-modal').classList.remove('open');
  }
}

function selectWeek(w, btn) {
  currentWeek = w;
  document.querySelectorAll('.wk-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTabs();
  renderDay();
}

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exportData() {
  const data = {
    version: 1,
    exported: new Date().toISOString(),
    data: getState()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `entreno_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Datos exportados correctamente');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      const data = parsed.data || parsed;
      setState(data);
      showToast('✓ Datos importados correctamente');
      renderDay();
      renderHistorial();
    } catch {
      showToast('✗ Error al importar el archivo');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAllData() {
  if (confirm('¿Borrar todos los datos? Esta acción no se puede deshacer.')) {
    localStorage.removeItem('gym_v2');
    showToast('✓ Datos borrados');
    renderDay();
    renderHistorial();
  }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// INIT
renderTabs();
renderDay();
</script>

<!-- PWA -->
<script>
(function() {
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#1e293b';
    ctx.beginPath();
    ctx.roundRect(0, 0, size, size, size * 0.22);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = '800 ' + Math.round(size * 0.38) + 'px Arial Black, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('ET', size / 2, size * 0.48);
    ctx.fillStyle = '#2563eb';
    const r = size * 0.07;
    ctx.beginPath();
    ctx.arc(size * 0.62, size * 0.72, r, 0, Math.PI * 2);
    ctx.fill();
    return c.toDataURL('image/png');
  }

  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);
  const icon180 = makeIcon(180);

  document.getElementById('pwa-icon').href = icon180;

  const manifest = {
    name: 'EN TRENO',
    short_name: 'EnTreno',
    description: 'App de seguimiento de entrenos',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#1e293b',
    theme_color: '#1e293b',
    start_url: './',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png' },
      { src: icon512, sizes: '512x512', type: 'image/png' }
    ]
  };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);

  if ('serviceWorker' in navigator) {
    const swCode = [
      'const CACHE = "entreno-v2";',
      'const PAGE_URL = self.registration.scope;',
      'self.addEventListener("install", e => { self.skipWaiting(); e.waitUntil(caches.open(CACHE).then(c => c.add(PAGE_URL))); });',
      'self.addEventListener("activate", e => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))).then(() => clients.claim())); });',
      'self.addEventListener("fetch", e => { if (e.request.mode === "navigate") { e.respondWith(fetch(e.request).then(res => { const clone = res.clone(); caches.open(CACHE).then(c => c.put(e.request, clone)); return res; }).catch(() => caches.match(PAGE_URL))); } });'
    ].join('\n');
    const blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: './' }).catch(() => {});
  }
})();
</script>
